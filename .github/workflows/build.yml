name: Build & Release Omnimorf

# Triggers:
#  - Push a tag like v1.0.0 → full 3-platform build → publish GitHub Release
#  - Manual dispatch → test build, artifacts only, no release
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for test build (not published)'
        required: false
        default: 'v0.0.0-test'

env:
  NODE_VERSION: '20'

jobs:
  # ══════════════════════════════════════════════════════════════
  #  WINDOWS BUILD
  # ══════════════════════════════════════════════════════════════
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Download FFmpeg (Windows static)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path binaries/win | Out-Null
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg-tmp -Force
          Copy-Item -Path "ffmpeg-tmp/ffmpeg-master-latest-win64-gpl/bin/ffmpeg.exe" -Destination "binaries/win/ffmpeg.exe"
          Remove-Item -Recurse -Force ffmpeg-tmp, ffmpeg.zip
          Write-Host "FFmpeg copied to binaries/win/"

      - name: Download ImageMagick 7 (Windows portable)
        shell: pwsh
        run: |
          # Query GitHub API for latest release — never hardcode a version URL
          # ImageMagick portable builds are .7z (not .zip)
          $headers = @{ 'User-Agent' = 'Omnimorf-CI' }
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/ImageMagick/ImageMagick/releases/latest" -Headers $headers
          $asset = $release.assets | Where-Object { $_.name -match "ImageMagick-.*portable-Q16-x64\.7z$" } | Select-Object -First 1
          if (-not $asset) {
            $asset = $release.assets | Where-Object { $_.name -match "ImageMagick-.*portable-Q16-HDRI-x64\.7z$" } | Select-Object -First 1
          }
          if (-not $asset) { throw "No portable ImageMagick 7z found in latest GitHub release" }
          Write-Host "Downloading: $($asset.name)"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile magick.7z
          7z x magick.7z -omagick-tmp -y | Out-Null
          $mg = Get-ChildItem -Path magick-tmp -Recurse -Filter "magick.exe" | Select-Object -First 1
          if (-not $mg) { throw "magick.exe not found in extracted archive" }
          Copy-Item -Path $mg.FullName -Destination "binaries/win/magick.exe"
          Remove-Item -Recurse -Force magick-tmp, magick.7z
          Write-Host "ImageMagick magick.exe copied to binaries/win/"

      - name: Download Tesseract OCR language data
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path binaries/win/tessdata | Out-Null
          Invoke-WebRequest -Uri "https://github.com/tesseract-ocr/tessdata_fast/raw/main/eng.traineddata" -OutFile "binaries/win/tessdata/eng.traineddata"
          Write-Host "Tesseract eng.traineddata downloaded to binaries/win/tessdata/"

      - name: Build Windows (NSIS installer)
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Stable filenames
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/release | Out-Null
          Get-ChildItem -Path dist -Filter "*Setup*.exe" | ForEach-Object { Copy-Item $_.FullName "dist/release/Omnimorf-Setup-Windows.exe" -Force }
          # Auto-update metadata
          if (Test-Path "dist/latest.yml") { Copy-Item "dist/latest.yml" "dist/release/latest.yml" }

      - uses: actions/upload-artifact@v4
        with:
          name: omnimorf-windows
          path: |
            dist/release/*.exe
            dist/release/latest.yml

  # ══════════════════════════════════════════════════════════════
  #  MACOS BUILD
  # ══════════════════════════════════════════════════════════════
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Download FFmpeg (macOS static)
        run: |
          mkdir -p binaries/mac
          # evermeet.cx — standard source for macOS static FFmpeg builds (auto-latest)
          curl -L -o ffmpeg.zip "https://evermeet.cx/ffmpeg/getrelease/zip" || {
            echo "evermeet.cx unavailable — falling back to osxexperts.net"
            curl -L -o ffmpeg.zip "https://www.osxexperts.net/ffmpeg71arm.zip"
          }
          unzip -q ffmpeg.zip -d ffmpeg-tmp
          # Handle both flat and nested archive structures
          find ffmpeg-tmp -name "ffmpeg" -type f | head -1 | xargs -I{} cp {} binaries/mac/ffmpeg
          chmod +x binaries/mac/ffmpeg
          rm -rf ffmpeg-tmp ffmpeg.zip
          echo "FFmpeg copied to binaries/mac/"

      - name: Build ImageMagick 7 static (macOS)
        run: |
          # Homebrew's magick is dynamically linked — breaks without Homebrew on customer machines
          # Build from source: static-link format libs, only system frameworks remain dynamic
          brew install pkg-config jpeg-turbo libpng libtiff webp
          curl -L -o im.tar.gz "https://imagemagick.org/archive/ImageMagick.tar.gz"
          tar -xf im.tar.gz
          cd ImageMagick-*
          ./configure --prefix=/tmp/im7 \
            --enable-static --disable-shared \
            --without-x --without-perl --without-magick-plus-plus \
            --with-modules=no \
            --with-jpeg --with-png --with-tiff --with-webp \
            PKG_CONFIG_PATH="$(brew --prefix jpeg-turbo)/lib/pkgconfig:$(brew --prefix libpng)/lib/pkgconfig:$(brew --prefix libtiff)/lib/pkgconfig:$(brew --prefix webp)/lib/pkgconfig" \
            LDFLAGS="-L$(brew --prefix jpeg-turbo)/lib -L$(brew --prefix libpng)/lib -L$(brew --prefix libtiff)/lib -L$(brew --prefix webp)/lib" \
            CPPFLAGS="-I$(brew --prefix jpeg-turbo)/include -I$(brew --prefix libpng)/include -I$(brew --prefix libtiff)/include -I$(brew --prefix webp)/include"
          make -j$(sysctl -n hw.ncpu)
          make install
          cd ..
          cp /tmp/im7/bin/magick binaries/mac/magick
          chmod +x binaries/mac/magick
          # Verify it runs standalone
          binaries/mac/magick --version
          rm -rf ImageMagick-* im.tar.gz /tmp/im7
          echo "ImageMagick static magick copied to binaries/mac/"

      - name: Download Tesseract OCR language data
        run: |
          mkdir -p binaries/mac/tessdata
          curl -L -o binaries/mac/tessdata/eng.traineddata "https://github.com/tesseract-ocr/tessdata_fast/raw/main/eng.traineddata"
          echo "Tesseract eng.traineddata downloaded to binaries/mac/tessdata/"

      - name: Ad-hoc sign bundled binaries
        run: |
          codesign --force --deep --sign - binaries/mac/ffmpeg || true
          codesign --force --deep --sign - binaries/mac/magick || true

      - name: Generate icon.icns
        run: |
          # electron-builder requires assets/icon.icns for macOS — generate from icon.png
          mkdir -p icon.iconset
          sips -z   16   16 assets/icon.png --out icon.iconset/icon_16x16.png
          sips -z   32   32 assets/icon.png --out icon.iconset/icon_16x16@2x.png
          sips -z   32   32 assets/icon.png --out icon.iconset/icon_32x32.png
          sips -z   64   64 assets/icon.png --out icon.iconset/icon_32x32@2x.png
          sips -z  128  128 assets/icon.png --out icon.iconset/icon_128x128.png
          sips -z  256  256 assets/icon.png --out icon.iconset/icon_128x128@2x.png
          sips -z  256  256 assets/icon.png --out icon.iconset/icon_256x256.png
          sips -z  512  512 assets/icon.png --out icon.iconset/icon_256x256@2x.png
          sips -z  512  512 assets/icon.png --out icon.iconset/icon_512x512.png
          sips -z 1024 1024 assets/icon.png --out icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset -o assets/icon.icns
          rm -rf icon.iconset
          echo "Generated assets/icon.icns"

      - name: Build macOS (DMG + ZIP — x64 + arm64)
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Ad-hoc sign the final .app
        run: |
          find dist -name "*.app" -type d -exec codesign --force --deep --sign - {} \; || true

      - name: Stable filenames
        run: |
          mkdir -p dist/release
          for f in dist/*.dmg; do
            if [[ "$f" == *"arm64"* ]]; then cp "$f" "dist/release/Omnimorf-macOS-AppleSilicon.dmg"
            else cp "$f" "dist/release/Omnimorf-macOS-Intel.dmg"
            fi
          done
          for f in dist/*.zip; do
            if [[ "$f" == *"arm64"* ]]; then cp "$f" "dist/release/Omnimorf-macOS-AppleSilicon.zip"
            else cp "$f" "dist/release/Omnimorf-macOS-Intel.zip"
            fi
          done
          # Auto-update metadata (electron-updater reads these from GitHub Releases)
          cp dist/latest-mac.yml dist/release/ 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: omnimorf-macos
          path: |
            dist/release/*.dmg
            dist/release/*.zip
            dist/release/latest-mac.yml

  # ══════════════════════════════════════════════════════════════
  #  LINUX BUILD
  # ══════════════════════════════════════════════════════════════
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2

      - name: Download FFmpeg (Linux x64 static)
        run: |
          mkdir -p binaries/linux
          curl -L -o ffmpeg.tar.xz "https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz"
          tar -xf ffmpeg.tar.xz
          cp ffmpeg-*-amd64-static/ffmpeg binaries/linux/ffmpeg
          chmod +x binaries/linux/ffmpeg
          rm -rf ffmpeg-*-amd64-static ffmpeg.tar.xz

      - name: Download ImageMagick 7 (Linux x64)
        run: |
          mkdir -p binaries/linux
          # apt gives v6 (convert only) — Omnimorf needs v7 (magick binary)
          # Download official AppImage from GitHub, extract static magick binary
          RELEASE_JSON=$(curl -s "https://api.github.com/repos/ImageMagick/ImageMagick/releases/latest")
          APPIMAGE_URL=$(echo "$RELEASE_JSON" | grep -oP '"browser_download_url":\s*"\K[^"]*ImageMagick-[^"]*gcc-x86_64\.AppImage(?=")' | head -1)
          if [ -z "$APPIMAGE_URL" ]; then
            # Broader fallback: any x86_64 AppImage
            APPIMAGE_URL=$(echo "$RELEASE_JSON" | grep -oP '"browser_download_url":\s*"\K[^"]*x86_64\.AppImage(?=")' | head -1)
          fi
          if [ -n "$APPIMAGE_URL" ]; then
            echo "Downloading AppImage: $APPIMAGE_URL"
            curl -L -o magick.AppImage "$APPIMAGE_URL"
            chmod +x magick.AppImage
            # --appimage-extract works without FUSE
            ./magick.AppImage --appimage-extract > /dev/null 2>&1
            cp squashfs-root/usr/bin/magick binaries/linux/magick
            rm -rf squashfs-root magick.AppImage
          else
            echo "No AppImage found — building ImageMagick 7 from source"
            sudo apt-get install -y build-essential pkg-config libjpeg-dev libpng-dev libtiff-dev libwebp-dev
            curl -L -o magick.tar.gz "https://imagemagick.org/archive/ImageMagick.tar.gz"
            tar -xf magick.tar.gz
            cd ImageMagick-*
            ./configure --prefix=/tmp/im7 --disable-shared --enable-static --with-modules=no --without-x --without-perl
            make -j$(nproc)
            make install
            cd ..
            cp /tmp/im7/bin/magick binaries/linux/magick
            rm -rf ImageMagick-* magick.tar.gz /tmp/im7
          fi
          chmod +x binaries/linux/magick
          binaries/linux/magick --version || echo "Warning: magick binary may need runtime libs"
          echo "ImageMagick magick copied to binaries/linux/"

      - name: Download Tesseract OCR language data
        run: |
          mkdir -p binaries/linux/tessdata
          curl -L -o binaries/linux/tessdata/eng.traineddata "https://github.com/tesseract-ocr/tessdata_fast/raw/main/eng.traineddata"
          echo "Tesseract eng.traineddata downloaded to binaries/linux/tessdata/"

      - name: Build Linux (AppImage + .deb)
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Stable filenames
        run: |
          mkdir -p dist/release
          for f in dist/*.AppImage; do cp "$f" "dist/release/Omnimorf-Linux.AppImage"; done
          for f in dist/*.deb; do cp "$f" "dist/release/Omnimorf-Linux.deb"; done
          # Auto-update metadata
          cp dist/latest-linux.yml dist/release/ 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: omnimorf-linux
          path: dist/release/*

  # ══════════════════════════════════════════════════════════════
  #  PUBLISH RELEASE (only on v*.*.* tag push)
  # ══════════════════════════════════════════════════════════════
  publish:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.zip" -o -name "*.AppImage" -o -name "*.deb" -o -name "latest*.yml" \) -exec cp {} release-assets/ \;
          ls -la release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Omnimorf ${{ github.ref_name }}
          body: |
            # Omnimorf ${{ github.ref_name }}

            Universal file converter. Zero uploads. One price. Forever.

            ## Downloads
            - **Windows**: `Omnimorf-Setup-Windows.exe`
            - **macOS (Apple Silicon)**: `Omnimorf-macOS-AppleSilicon.dmg`
            - **macOS (Intel)**: `Omnimorf-macOS-Intel.dmg`
            - **Linux (AppImage)**: `Omnimorf-Linux.AppImage`
            - **Linux (Debian/Ubuntu)**: `Omnimorf-Linux.deb`

            First time installing? See https://omnimorf.com/#install
          files: release-assets/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
