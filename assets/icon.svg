<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Main background gradient — deep space -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#120e2a"/>
    </linearGradient>

    <!-- Primary violet gradient -->
    <linearGradient id="violet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>

    <!-- Hot accent gradient — the eye catcher -->
    <linearGradient id="hot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <!-- Cyan accent for contrast pop -->
    <linearGradient id="cyan" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>

    <!-- Inner glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#7c3aed" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0a0a1a" stop-opacity="0"/>
    </radialGradient>

    <!-- Outer ring glow -->
    <filter id="outerGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Soft bloom on the morph shape -->
    <filter id="bloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Subtle shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#7c3aed" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background — rounded square -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>

  <!-- Ambient glow behind everything -->
  <circle cx="256" cy="256" r="200" fill="url(#glow)"/>

  <!-- Outer orbit ring — thin, elegant -->
  <circle cx="256" cy="256" r="185" fill="none" stroke="url(#violet)" stroke-width="1.5" stroke-opacity="0.25"/>

  <!-- Second orbit ring — offset for depth -->
  <ellipse cx="256" cy="256" rx="170" ry="155" fill="none" stroke="url(#cyan)" stroke-width="1" stroke-opacity="0.15" transform="rotate(-15 256 256)"/>

  <!-- THE MORPH SYMBOL — overlapping flowing shapes suggesting infinite transformation -->
  <g filter="url(#bloom)">
    <!-- Shape 1: Left morph blade — flowing curve -->
    <path d="M 180 256
             C 180 190, 220 145, 256 145
             C 292 145, 310 180, 310 210
             C 310 240, 285 260, 256 260
             C 227 260, 180 322, 180 256 Z"
          fill="url(#violet)" opacity="0.9"/>

    <!-- Shape 2: Right morph blade — mirror flow -->
    <path d="M 332 256
             C 332 322, 292 367, 256 367
             C 220 367, 202 332, 202 302
             C 202 272, 227 252, 256 252
             C 285 252, 332 190, 332 256 Z"
          fill="url(#hot)" opacity="0.85"/>
  </g>

  <!-- Center diamond — the transformation core -->
  <g filter="url(#outerGlow)">
    <rect x="240" y="240" width="32" height="32" rx="4" ry="4"
          fill="white" opacity="0.95"
          transform="rotate(45 256 256)"/>
  </g>

  <!-- Top-right particle — small accent dot -->
  <circle cx="370" cy="135" r="4" fill="#c084fc" opacity="0.7"/>
  <circle cx="385" cy="148" r="2.5" fill="#a855f7" opacity="0.5"/>

  <!-- Bottom-left particle -->
  <circle cx="142" cy="377" r="3.5" fill="#06b6d4" opacity="0.6"/>
  <circle cx="128" cy="365" r="2" fill="#8b5cf6" opacity="0.4"/>

  <!-- Top-left subtle particle -->
  <circle cx="148" cy="142" r="2" fill="#c084fc" opacity="0.3"/>

  <!-- Bottom-right subtle particle -->
  <circle cx="374" cy="370" r="2.5" fill="#06b6d4" opacity="0.35"/>

  <!-- Orbital dots on the ring — like electrons -->
  <circle cx="256" cy="71" r="5" fill="#a855f7" opacity="0.8"/>
  <circle cx="441" cy="256" r="4" fill="#c084fc" opacity="0.6"/>
  <circle cx="256" cy="441" r="5" fill="#06b6d4" opacity="0.7"/>
  <circle cx="71" cy="256" r="4" fill="#8b5cf6" opacity="0.5"/>

  <!-- Inner light streaks — subtle energy lines through the morph -->
  <line x1="210" y1="230" x2="302" y2="282" stroke="white" stroke-width="0.8" stroke-opacity="0.15"/>
  <line x1="220" y1="290" x2="295" y2="225" stroke="white" stroke-width="0.6" stroke-opacity="0.1"/>

  <!-- Wordmark gradient — matches nav wordmark exactly -->
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="25%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="75%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="glow"/>
      <feComposite in="SourceGraphic" in2="glow" operator="over"/>
    </filter>
  </defs>

  <!-- OMNIMORF wordmark -->
  <g filter="url(#textGlow)">
    <text x="256" y="438" text-anchor="middle" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="62" font-weight="900" letter-spacing="8" fill="url(#textGrad)">OMNIMORF</text>
  </g>

  <!-- Subtle underline accent -->
  <line x1="120" y1="452" x2="392" y2="452" stroke="url(#violet)" stroke-width="1.5" stroke-opacity="0.4" stroke-linecap="round"/>
</svg>
